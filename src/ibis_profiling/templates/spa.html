<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibis Profiling Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; font-size: 14px; color: #333; background-color: #fff; }
    .navbar { background-color: #f8f9fa !important; border-bottom: 1px solid #ddd; padding: 10px 0; }
    .navbar-brand { font-weight: 700; color: #333 !important; }
    .sidebar { width: 250px; background-color: #f8f9fa; border-right: 1px solid #dee2e6; position: fixed; height: 100vh; padding: 1rem; }
    .content { margin-left: 250px; padding: 2rem; overflow-y: auto; }
    .section-header { margin-top: 40px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .section-name { font-size: 28px; font-weight: 700; }
    .row.item { margin-bottom: 30px; }
    .item-header { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #444; }
    .table th { font-weight: 600; color: #666; background-color: transparent !important; }
    .variable { padding: 20px 0; border-bottom: 1px solid #eee; }
    .var-name { font-family: monospace; font-weight: 700; font-size: 1.2rem; color: #007bff; text-decoration: none; }
    .badge { text-transform: uppercase; padding: 4px 8px; font-weight: 500; font-size: 11px; }
    .metric-value { font-family: monospace; font-weight: 600; text-align: right; white-space: nowrap; }
    .nav-link { color: #333; cursor: pointer; }
    .nav-link.active { background-color: #0d6efd !important; color: white !important; }
    #view-container > div { display: none; }
    #view-container > div.active { display: block; }
    .details-section { background-color: #fcfcfc; border: 1px solid #eee; border-radius: 4px; padding: 1.5rem; margin-top: 1rem; }
  </style>
</head>
<body>

  <div class="sidebar d-flex flex-column">
    <h4 class="fw-bold text-primary mb-4">Ibis Profiling</h4>
    <a href="#overview" class="nav-link active mb-1" onclick="nav('overview')">Overview</a>
    <a href="#variables" class="nav-link mb-1" onclick="nav('variables')">Variables</a>
    <a href="#correlations" class="nav-link mb-1" onclick="nav('correlations')">Correlations</a>
    <a href="#missing" class="nav-link mb-1" onclick="nav('missing')">Missing Values</a>
    <a href="#sample" class="nav-link mb-1" onclick="nav('sample')">Sample</a>
  </div>

  <div class="content">
    <div id="view-container">
      <div id="view-overview" class="active"></div>
      <div id="view-variables"></div>
      <div id="view-correlations"></div>
      <div id="view-missing"></div>
      <div id="view-sample"></div>
    </div>
  </div>

  <script id="report-data" type="application/json">
    {{REPORT_DATA}}
  </script>

  <script>
    const data = JSON.parse(document.getElementById("report-data").textContent);
    const state = { rendered: {} };

    function nav(viewId) {
      document.querySelectorAll(".sidebar .nav-link").forEach(el => el.classList.remove("active"));
      const activeLink = document.querySelector(`.sidebar a[href="#${viewId}"]`);
      if(activeLink) activeLink.classList.add("active");
      
      document.querySelectorAll("#view-container > div").forEach(el => el.classList.remove("active"));
      const viewEl = document.getElementById(`view-${viewId}`);
      viewEl.classList.add("active");

      if (!state.rendered[viewId]) {
        renderView(viewId, viewEl);
        state.rendered[viewId] = true;
      }
    }

    function renderView(viewId, container) {
      if (viewId === 'overview') renderOverview(container);
      else if (viewId === 'variables') renderVariables(container);
      else if (viewId === 'correlations') renderCorrelations(container);
      else if (viewId === 'missing') renderMissing(container);
      else if (viewId === 'sample') renderSample(container);
    }

    function renderOverview(container) {
      const t = data.table || {};
      const alerts = data.alerts || [];
      let typesHtml = "";
      if(t.types) Object.entries(t.types).forEach(([k,v]) => {
        typesHtml += `<tr><th>${k}</th><td class='metric-value'>${v}</td></tr>`;
      });

      let alertsHtml = alerts.length ? alerts.map(a => `<tr><td><code>${a.fields[0]}</code> has ${a.type.toLowerCase()}</td><td><span class='badge bg-info'>${a.type}</span></td></tr>`).join("") : "<tr><td class='text-muted'>No alerts.</td></tr>";

      container.innerHTML = `
        <div class='section-header'><h1 class='section-name'>Overview</h1></div>
        <div class="row item">
          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-stats">Overview</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-alerts">Alerts <span class="badge bg-secondary">${alerts.length}</span></button></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-stats">
              <div class="row">
                <div class="col-sm-6">
                  <p class="h4 item-header">Dataset statistics</p>
                  <table class="table table-striped">
                    <tbody>
                      <tr><th>Number of variables</th><td class='metric-value'>${t.n_var}</td></tr>
                      <tr><th>Number of observations</th><td class='metric-value'>${t.n.toLocaleString()}</td></tr>
                      <tr><th>Missing cells</th><td class='metric-value'>${t.n_cells_missing.toLocaleString()}</td></tr>
                      <tr><th>Missing cells (%)</th><td class='metric-value'>${(t.p_cells_missing*100).toFixed(1)}%</td></tr>
                    </tbody>
                  </table>
                </div>
                <div class="col-sm-6">
                  <p class="h4 item-header">Variable types</p>
                  <table class="table table-striped"><tbody>${typesHtml}</tbody></table>
                </div>
              </div>
            </div>
            <div class="tab-pane fade" id="tab-alerts">
              <table class="table table-striped"><tbody>${alertsHtml}</tbody></table>
            </div>
          </div>
        </div>
      `;
    }

    function renderVariables(container) {
      container.innerHTML = `<div class='section-header'><h1 class='section-name'>Variables</h1></div>`;
      Object.entries(data.variables).forEach(([col, stats], i) => {
        const div = document.createElement("div");
        div.className = "variable row item";
        const chartId = `chart-${i}`;
        const detailsId = `details-${i}`;
        
        let leftStats = `
          <tr><th>Distinct</th><td class='metric-value'>${stats.n_distinct.toLocaleString()}</td></tr>
          <tr><th>Distinct (%)</th><td class='metric-value'>${(stats.distinct_perc*100).toFixed(1)}%</td></tr>
          <tr><th>Missing</th><td class='metric-value'>${stats.n_missing.toLocaleString()}</td></tr>
          <tr><th>Missing (%)</th><td class='metric-value'>${(stats.p_missing*100).toFixed(1)}%</td></tr>
        `;
        
        let midStats = "";
        if(stats.type === "Numeric") {
          midStats = `
            <tr><th>Mean</th><td class='metric-value'>${stats.mean ? stats.mean.toFixed(4) : ''}</td></tr>
            <tr><th>Minimum</th><td class='metric-value'>${stats.min}</td></tr>
            <tr><th>Maximum</th><td class='metric-value'>${stats.max}</td></tr>
            <tr><th>Zeros</th><td class='metric-value'>${stats.zeros || 0}</td></tr>
          `;
        }

        div.innerHTML = `
          <div class="col-sm-12"><p class="item-header h4"><a class="var-name" href="#">${col}</a><br><span class="fs-6 text-body-secondary">${stats.type}</span></p></div>
          <div class="col-sm-4"><table class="table table-striped small"><tbody>${leftStats}</tbody></table></div>
          <div class="col-sm-4"><table class="table table-striped small"><tbody>${midStats}</tbody></table></div>
          <div class="col-sm-4"><div id="${chartId}" style="height: 150px;"></div></div>
          <div class="col-sm-12 text-end">
            <button class="btn btn-light btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#${detailsId}">More details</button>
          </div>
          <div class="collapse col-sm-12" id="${detailsId}">
            <div class="details-section">
              <ul class="nav nav-tabs mb-3" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#stats-${i}">Statistics</button></li>
                ${stats.type === 'Numeric' ? `<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#quantiles-${i}">Quantiles</button></li>` : ''}
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#values-${i}">Common Values</button></li>
              </ul>
              <div class="tab-content">
                <div class="tab-pane fade show active" id="stats-${i}">
                  <div class="row">
                    <div class="col-md-6">
                      <table class="table table-sm small">
                        ${stats.type === 'Numeric' ? `
                          <tr><th>Standard deviation</th><td class='metric-value'>${stats.std ? stats.std.toFixed(4) : ''}</td></tr>
                          <tr><th>Variance</th><td class='metric-value'>${stats.variance ? stats.variance.toFixed(4) : ''}</td></tr>
                          <tr><th>Kurtosis</th><td class='metric-value'>${stats.kurtosis ? stats.kurtosis.toFixed(4) : ''}</td></tr>
                          <tr><th>Skewness</th><td class='metric-value'>${stats.skewness ? stats.skewness.toFixed(4) : ''}</td></tr>
                        ` : `<tr><td colspan="2" class="text-muted">Descriptive stats not available for categorical.</td></tr>`}
                      </table>
                    </div>
                  </div>
                </div>
                <div class="tab-pane fade" id="quantiles-${i}">
                   <table class="table table-sm small w-50">
                     ${Object.entries(stats.quantiles || {}).map(([p, v]) => `<tr><th>${p}</th><td class='metric-value'>${v}</td></tr>`).join("")}
                   </table>
                </div>
                <div class="tab-pane fade" id="values-${i}">
                   <table class="table table-sm table-striped small">
                     <thead><tr><th>Value</th><th>Count</th><th>Frequency (%)</th></tr></thead>
                     <tbody>
                       ${stats.histogram ? stats.histogram.bins.map((b, idx) => `
                         <tr><td>${b}</td><td class='metric-value'>${stats.histogram.counts[idx].toLocaleString()}</td><td class='metric-value'>${((stats.histogram.counts[idx]/data.table.n)*100).toFixed(1)}%</td></tr>
                       `).join("") : ''}
                     </tbody>
                   </table>
                </div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);

        if (stats.histogram) {
          setTimeout(() => {
            Plotly.newPlot(chartId, [{x: stats.histogram.bins, y: stats.histogram.counts, type: 'bar', marker: {color: '#0d6efd'}}], 
            {margin: {t: 5, b: 20, l: 30, r: 5}, height: 150, font: {size: 10}}, {displayModeBar: false});
          }, 50);
        }
      });
    }

    function renderCorrelations(container) {
      container.innerHTML = `<div class='section-header'><h1 class='section-name'>Correlations</h1></div>`;
      const corrs = data.correlations || {};
      Object.entries(corrs).forEach(([name, d], i) => {
        if (!d.matrix || d.matrix.length === 0) return;
        const div = document.createElement("div");
        div.className = "row item";
        const chartId = `corr-${i}`;
        div.innerHTML = `<div class='col-sm-12'><p class='h4 item-header text-capitalize'>${name}</p><div id='${chartId}' style='height: 600px;'></div></div>`;
        container.appendChild(div);

        setTimeout(() => {
          Plotly.newPlot(chartId, [{
            z: d.matrix, x: d.columns, y: d.columns, type: 'heatmap',
            colorscale: [[0, '#f46d43'], [0.5, '#ffffbf'], [1, '#66bd63']],
            zmin: -1, zmax: 1
          }], {
            margin: { t: 30, b: 100, l: 100, r: 30 },
            height: 600
          });
        }, 50);
      });
    }

    function renderMissing(container) {
      container.innerHTML = `<div class='section-header'><h1 class='section-name'>Missing Values</h1></div>`;
      const m = data.missing || {};
      if (m.bar && m.bar.counts) {
        const div = document.createElement("div");
        div.className = "row item";
        const chartId = "missing-bar";
        div.innerHTML = `<div class='col-sm-12'><p class='h4 item-header'>Missing Values (Count)</p><div id='${chartId}' style='height: 400px;'></div></div>`;
        container.appendChild(div);

        setTimeout(() => {
          Plotly.newPlot(chartId, [{
            x: m.bar.columns, y: m.bar.counts, type: 'bar', marker: {color: '#6c757d'}
          }], {
            margin: { t: 10, b: 100, l: 50, r: 10 },
            height: 400
          });
        }, 50);
      }
    }

    function renderSample(container) {
      container.innerHTML = `<div class='section-header'><h1 class='section-name'>Sample</h1></div>`;
      const s = data.sample || {};
      ['head', 'tail'].forEach(stype => {
        if (!s[stype]) return;
        const keys = Object.keys(s[stype]);
        const rows = s[stype][keys[0]].length;
        let html = `<p class='h4 item-header text-capitalize'>${stype}</p><div class='table-responsive'><table class='table table-sm table-striped border small'><thead><tr>`;
        keys.forEach(k => html += `<th>${k}</th>`);
        html += `</tr></thead><tbody>`;
        for(let r=0; r<rows; r++) {
          html += `<tr>`;
          keys.forEach(k => html += `<td>${s[stype][k][r]}</td>`);
          html += `</tr>`;
        }
        container.innerHTML += html + `</tbody></table></div><br>`;
      });
    }

    window.addEventListener('hashchange', () => nav(window.location.hash.substring(1) || 'overview'));
    nav(window.location.hash.substring(1) || 'overview');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
