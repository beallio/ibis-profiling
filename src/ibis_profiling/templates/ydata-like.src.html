<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibis Profiling Report</title>
  {{CSP_META}}
  
  <script nonce="{{NONCE}}">
    // Silence JIT-related production warnings
    (function() {
      const originalWarn = console.warn;
      const originalError = console.error;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('cdn.tailwindcss.com') || 
          args[0].includes('in-browser Babel transformer')
        )) return;
        originalWarn.apply(console, args);
      };
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('-webkit-text-size-adjust') ||
          args[0].includes('bad selector')
        )) return;
        originalError.apply(console, args);
      };
    })();
  </script>
  
  <!-- Tailwind CSS -->
  {{TAILWIND_SCRIPT}}


  <!-- React & Dependencies (UMD Builds for local file portability) -->
  {{REACT_SCRIPT}}
  <script nonce="{{NONCE}}">window.react = window.React;</script>
  {{REACT_DOM_SCRIPT}}
  {{LUCIDE_SCRIPT}}

  <style>
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: #f3f4f6;
      color: #1f2937;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      display: block;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9; 
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    section {
      padding-top: 1rem;
      margin-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
    }
    section:first-of-type {
      border-top: none;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React Application -->
  <!-- {{APP_BUNDLE}} -->
</body>
</html>
