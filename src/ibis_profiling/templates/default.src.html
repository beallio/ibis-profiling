<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibis Profiling Report</title>
  {{CSP_META}}
  
  <script nonce="{{NONCE}}">
    // Silence JIT-related production warnings
    (function() {
      const originalWarn = console.warn;
      const originalError = console.error;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('cdn.tailwindcss.com') || 
          args[0].includes('in-browser Babel transformer')
        )) return;
        originalWarn.apply(console, args);
      };
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (
          args[0].includes('-webkit-text-size-adjust') ||
          args[0].includes('bad selector')
        )) return;
        originalError.apply(console, args);
      };
    })();
  </script>
  
  <!-- Tailwind CSS -->
  {{TAILWIND_SCRIPT}}


  <!-- React & Dependencies (UMD Builds for local file portability) -->
  {{REACT_SCRIPT}}
  <script nonce="{{NONCE}}">window.react = window.React;</script>
  {{REACT_DOM_SCRIPT}}
  {{LUCIDE_SCRIPT}}

  <style>
    body {
      background-color: #020617;
      color: #e2e8f0;
    }
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React Application -->
  <!-- {{APP_BUNDLE}} -->
</body>
</html>
