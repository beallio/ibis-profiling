// Helper: Safely parse different matrix JSON structures
const parseMatrixData = (data) => {
if (!data) return { columns: [], matrix: [] };
// 1) Handle array of objects format (e.g. from missing heatmap or correlations)
if (Array.isArray(data)) {
if (data.length === 0) return { columns: [], matrix: [] };
const columns = Object.keys(data[0]);
const matrix = data.map(row => columns.map(col => row[col]));
return { columns, matrix };
}
// 2) Handle { columns, matrix } or { columns, values } standard shapes
if (data.columns) {
if (data.matrix) return { columns: data.columns, matrix: data.matrix };
if (data.values) return { columns: data.columns, matrix: data.values };
}
// 3) Handle nested data.matrix format
if (data.matrix && data.matrix.columns) {
if (data.matrix.matrix) return { columns: data.matrix.columns, matrix: data.matrix.matrix };
if (data.matrix.values) return { columns: data.matrix.columns, matrix: data.matrix.values };
}
return { columns: [], matrix: [] };
};

// Sub-component for Nullity Matrix Rendering (Missingno style SVG)
const NullityMatrix = ({ data }) => {
const { theme } = useContext(ThemeContext);
const parsed = parseMatrixData(data);
const columns = parsed.columns;
let values = parsed.matrix; // array containing booleans (true = missing data)
if (!columns || !columns.length || !values || !values.length) return null;
// Ibis sends this matrix in column-oriented format [cols][rows]
// We detect if transposition is needed based on dimensionality
// or just transpose it if values.length === columns.length
if (values.length === columns.length && Array.isArray(values[0]) && values[0].length > columns.length) {
// Transpose: [cols][rows] -> [rows][cols]
values = values[0].map((_, rIdx) => values.map(cArr => cArr[rIdx]));
}
const numRows = values.length;
const numCols = columns.length;
const svgWidth = 1000;
const svgHeight = 400;
const colWidth = svgWidth / numCols;
const rowHeight = svgHeight / numRows;
// Determine complete (non-missing) elements per row for the sparkline
const rowCompleteness = values.map(row => row.filter(isMissing => !isMissing).length);
// Helper to consolidate consecutive present data blocks for efficient SVG rendering
const getBlocks = (cIdx) => {
const blocks = [];
let inBlock = false;
let start = 0;
for (let r = 0; r < numRows; r++) {
// 'values' has true for missing. We draw dark blocks for PRESENT data.
const isPresent = !values[r][cIdx];
if (isPresent && !inBlock) {
inBlock = true;
start = r;
} else if (!isPresent && inBlock) {
inBlock = false;
blocks.push({ start, end: r - 1 });
}
}
if (inBlock) {
blocks.push({ start, end: numRows - 1 });
}
return blocks;
};
const sparklinePoints = rowCompleteness.map((count, rIdx) =>
`${(count / numCols) * 100},${rIdx * rowHeight + rowHeight / 2}`
).join(' ');
const sparkPoly = `0,${rowHeight / 2} ${sparklinePoints} 0,${(numRows - 1) * rowHeight + rowHeight / 2}`;
return (
<div className={`overflow-x-auto mt-12 pt-8 border-t ${theme.border}`}>
<h3 className={`font-bold text-xl mb-2 ${theme.textPrimary}`}>Nullity Matrix</h3>
<p className={`text-sm ${theme.textSub} mb-6`}>Dense visualization of data completeness (first {numRows} rows). Gaps indicate missing data.</p>

{}
<div className="flex mb-2">
{columns.map((c, i) => (

<span className={`absolute bottom-1 left-1/2 origin-bottom-left -rotate-45 text-[10px] font-mono ${theme.textMuted} whitespace-nowrap`}>{c}</span>
</div>
))}
</div>
{}
<svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} preserveAspectRatio="none" className={`w-full h-96 ${theme.bgInput} border ${theme.border} shadow-inner rounded-sm`}>
{columns.map((_, cIdx) => (
<g key={cIdx} transform={`translate(${cIdx * colWidth}, 0)`}>

fill={theme.id === 'light' ? '#475569' : '#cbd5e1'}
className="transition-all hover:fill-blue-400"
/>
))}
</g>
))}
</svg>
</div>
{}
<div className="w-20 h-96 relative flex flex-col items-center">

</div>
</div>
</div>
);

function App() {
const getInitialTheme = () => {
const saved = localStorage.getItem('ibis-profiler-theme');
return (saved && THEMES[saved]) ? THEMES[saved] : THEMES.dark;
};
const [theme, setThemeState] = useState(getInitialTheme);

setThemeState(t);
localStorage.setItem('ibis-profiler-theme', t.id);
};
useEffect(() => {
// Apply global background to body for smooth transitions
document.body.className = theme.bgMain;
// Also apply a data-theme attribute if needed for CSS
document.documentElement.setAttribute('data-theme', theme.id);
}, [theme]);
return (
<ThemeContext.Provider value={{ theme, setTheme }}>
<AppContent />
</ThemeContext.Provider>
);
}
const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
